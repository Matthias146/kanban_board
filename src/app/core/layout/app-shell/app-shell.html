<div class="app-shell">
  <header class="app-shell__header">
    <div class="app-shell__brand">
      <div class="app-shell__brand-badge">K</div>

      <div class="app-shell__brand-copy">
        <span class="app-shell__brand-eyebrow">Project Space</span>
        <h1>Nocturnal Kanban</h1>
      </div>
    </div>

    <div class="app-shell__actions">
      <div class="app-shell__user-card">
        <div class="app-shell__user-avatar">
          {{
            authService.isGuest()
              ? 'G'
              : (authService.user()?.email?.charAt(0)?.toUpperCase() ?? 'U')
          }}
        </div>

        <div class="app-shell__user-copy">
          <span class="app-shell__user-role">
            {{ authService.isGuest() ? 'Gastzugang' : 'Registrierter User' }}
          </span>
          <strong class="app-shell__user-name">
            {{ authService.isGuest() ? 'Gast' : authService.user()?.email }}
          </strong>
        </div>
      </div>

      <button type="button" class="logout-button" (click)="logout()">Logout</button>
    </div>
  </header>

  <main class="app-shell__content">
    <router-outlet />
  </main>
</div>
