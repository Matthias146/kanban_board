<div class="shell">
  <aside class="sidebar">
    <div class="logo">Kanban B2B</div>

    <nav class="nav">
      <a routerLink="/board" routerLinkActive="active">Board</a>
    </nav>
  </aside>

  <div class="content">
    <header class="topbar">
      <h1>Kanban Board</h1>

      <div class="topbar-actions">
        <span class="user-name">
          {{ authService.isGuest() ? 'Gast' : authService.user()?.email }}
        </span>
        <button type="button" class="logout-button" (click)="logout()">Logout</button>
      </div>
    </header>

    <main class="main-content">
      <router-outlet />
    </main>
  </div>
</div>
