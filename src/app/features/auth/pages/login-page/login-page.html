<section class="login-page">
  <div class="login-card">
    <h2>Login</h2>
    <p>Frontend-only Auth kommt im nächsten Milestone.</p>

    <form class="login-form">
      <div class="form-field">
        <label class="form-label" for="email">E-Mail</label>
        <input id="email" class="form-control" type="email" placeholder="demo@company.com" />
        <span class="form-hint">Nutze später unseren Demo-Login.</span>
      </div>

      <div class="form-field">
        <label class="form-label" for="password">Passwort</label>
        <input id="password" class="form-control" type="password" placeholder="••••••••" />
      </div>

      <button type="button">Demo Login</button>
    </form>
  </div>
</section>
